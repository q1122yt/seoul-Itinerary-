<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾喝掛之旅 - 友誼大考驗</title>
    <!-- 基礎框架與樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafaf9; overflow-x: hidden; color: #334155; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.4; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        .sakura { position: fixed; top: -10px; pointer-events: none; z-index: 0; animation: fall linear infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #0f766e; transform: scale(1.1); font-weight: 900; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const { useState, useEffect, useMemo } = React;

        // --- 預設資料 (防止白屏) ---
        const DEFAULT_DATA = [
            { day: 1, type: '航班', name: '去程航班 EDQCZ3', time: '17:55', note: '台中清泉崗 17:55 出發', address: '台中市沙鹿區中航路一段168號' },
            { day: 1, type: '住宿', name: 'Airbnb 入住', time: '22:30', note: '3-1 Eunhaengjeong-ro 3-gil', address: '서울 양천구 은행정로3길 3-1' },
            { day: 2, type: '美食', name: 'Imok Smoke Dining', time: '12:30', note: '已訂位/已付費', address: '서울 강남구 압구정로2길 6', status: 'booked' },
            { day: 2, type: '美食', name: '먹거리양곱창 (烤牛腸)', time: '18:00', note: '在地人推薦', address: '서울 서초구 강남대로99길 35' },
            { day: 2, type: '美食', name: '新沙煎餅 (Sinsajeon)', time: '21:00', note: '必喝蜂巢瑪格麗酒', address: '서울 강남구 도산대로11길 18' },
            { day: 3, type: '美食', name: '倫敦貝果博物館 (安國店)', time: '08:30', note: '可以線上取號', address: '서울 종로구 北村路4街 20', canBook: true },
            { day: 3, type: '景點', name: '韓服體驗', time: '10:00', note: '預計3小時', address: '서울 종로구 사직로 137' },
            { day: 3, type: '美食', name: '聖水洞：水芹菜烤肉', time: '16:00', note: '清爽解膩', address: '서울 성동구 연무장길 38' },
            { day: 4, type: '美食', name: '牛味學 (Woo Mi Hak)', time: '12:00', note: '可訂位/高級韓牛', address: '서울 용산區 이태院路 238', canBook: true },
            { day: 4, type: '美食', name: '山清炭火烤肉 (麻谷本店)', time: '20:00', note: '可線上取號', address: '서울 강서구 마곡중앙8路 85', canBook: true },
            { day: 5, type: '購物', name: '汝矣島現代百貨', time: '10:30', address: '서울 영등포구 여의대로 108' },
            { day: 5, type: '購物', name: '樂天百貨 (明洞店)', time: '16:00', note: '明洞購物', address: '서울 中區 南大門路 81' },
            { day: 5, type: '景點', name: '明洞醫美預約', time: '17:00', address: '서울 中區 明洞7街 21', status: 'booked' },
            { day: 5, type: '美食', name: '烏達里家 醬蟹', time: '20:00', address: '서울 中區 明洞8나路 28' },
            { day: 6, type: '航班', name: '回程航班 KE2031', time: '14:45', note: '回台中清泉崗' }
        ];

        const CATEGORY_STYLES = {
            '美食': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200', icon: 'utensils', badge: 'bg-orange-100 text-orange-800' },
            '購物': { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200', icon: 'shopping-bag', badge: 'bg-purple-100 text-purple-800' },
            '景點': { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200', icon: 'camera', badge: 'bg-blue-100 text-blue-800' },
            '住宿': { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', icon: 'home', badge: 'bg-emerald-100 text-emerald-800' },
            '航班': { bg: 'bg-slate-800', text: 'text-white', border: 'border-slate-900', icon: 'plane', badge: 'bg-slate-700 text-white' },
            '其他': { bg: 'bg-gray-50', text: 'text-gray-700', border: 'border-gray-200', icon: 'more-vertical', badge: 'bg-gray-100 text-gray-800' }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(1);
            
            // 初始化行程為預設資料，確保雲端未連上時也能看到
            const initialItin = {};
            DEFAULT_DATA.forEach(item => {
                if(!initialItin[item.day]) initialItin[item.day] = [];
                initialItin[item.day].push({ ...item, id: Math.random().toString() });
            });
            const [itineraries, setItineraries] = useState(initialItin);
            
            const [spendingList, setSpendingList] = useState([]);
            const [shoppingList, setShoppingList] = useState([]);
            const [rate, setRate] = useState(42);
            const [krw, setKrw] = useState('');
            const [twd, setTwd] = useState('');
            const [travelers] = useState(['任', '晉', '沛']);

            const [showModal, setShowModal] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [itinForm, setItinForm] = useState({ type: '美食', name: '', time: '12:00', address: '', note: '' });
            const [spendForm, setSpendForm] = useState({ name: '', amount: '', method: '現金', paidBy: '任', splitBetween: ['任', '晉', '沛'], date: new Date().toISOString().split('T')[0] });
            const [showCopyToast, setShowCopyToast] = useState(false);

            // 安全獲取 Firebase 設定
            const getFirebaseConfig = () => {
                try {
                    return typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                } catch (e) { return null; }
            };

            const config = getFirebaseConfig();
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'seoul-drinking-ultimate-fixed';

            useEffect(() => {
                if (!config) return; // 沒設定就走離線模式
                const app = initializeApp(config);
                const db = getFirestore(app);
                const auth = getAuth(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (e) { console.warn("Firebase Auth Fail - Running Offline Mode"); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);

                // 資料同步監聽
                if (auth.currentUser || true) {
                    const itinRef = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                    onSnapshot(itinRef, async (snap) => {
                        if (snap.empty) {
                            const batch = writeBatch(db);
                            DEFAULT_DATA.forEach(item => batch.set(doc(itinRef), item));
                            await batch.commit();
                            return;
                        }
                        const data = {};
                        snap.forEach(doc => {
                            const item = { ...doc.data(), id: doc.id };
                            if (!data[item.day]) data[item.day] = [];
                            data[item.day].push(item);
                        });
                        Object.keys(data).forEach(d => data[d].sort((a,b) => a.time.localeCompare(b.time)));
                        setItineraries(data);
                    });

                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'spending'), (snap) => {
                        setSpendingList(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })).sort((a,b) => b.date.localeCompare(a.date)));
                    });

                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'shopping'), (snap) => {
                        setShoppingList(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                    });
                }
                return () => unsubscribe();
            }, []);

            const balances = useMemo(() => {
                const res = {};
                travelers.forEach(t => res[t] = { paid: 0, cost: 0, final: 0 });
                spendingList.forEach(s => {
                    const amt = parseFloat(s.amount) || 0;
                    if (res[s.paidBy]) res[s.paidBy].paid += amt;
                    const participants = s.splitBetween || [];
                    if (participants.length > 0) {
                        const share = amt / participants.length;
                        participants.forEach(p => { if (res[p]) res[p].cost += share; });
                    }
                });
                travelers.forEach(t => res[t].final = res[t].paid - res[t].cost);
                return res;
            }, [spendingList, travelers]);

            const totalKRW = spendingList.reduce((a, b) => a + (parseFloat(b.amount) || 0), 0);
            const copyAddr = (txt) => {
                const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
                el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setShowCopyToast(true); setTimeout(() => setShowCopyToast(false), 2000);
            };

            const dates = [{d:'Thu',n:'16'},{d:'Fri',n:'17'},{d:'Sat',n:'18'},{d:'Sun',n:'19'},{d:'Mon',n:'20'},{d:'Tue',n:'21'}];

            return (
                <div className="min-h-screen relative pb-32">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                        {[...Array(6)].map((_, i) => (
                            <div key={i} className="sakura" style={{ left: `${Math.random() * 100}%`, animationDuration: `${Math.random() * 10 + 10}s`, animationDelay: `${i*2}s` }}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="#14b8a6" fillOpacity="0.1"><path d="M12 21.5C12 21.5 19 16 21 11C23 6 18 2 13 5C12 5.5 12 6 12 6C12 6 12 5.5 11 5C6 2 1 6 3 11C5 16 12 21.5 12 21.5Z" /></svg>
                            </div>
                        ))}
                    </div>

                    {showCopyToast && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-2 rounded-full text-xs font-bold shadow-2xl">地址已複製！</div>}

                    <header className="bg-white px-6 pt-12 pb-4 sticky top-0 z-40 rounded-b-[40px] shadow-sm border-b border-stone-100">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-teal-700 p-2.5 rounded-2xl text-white shadow-lg"><Icon name="beer" size={24} /></div>
                                <div className="text-left leading-tight">
                                    <h1 className="text-xl font-black text-slate-800 tracking-tight">首爾喝掛之旅</h1>
                                    <p className="text-stone-400 text-[10px] font-bold uppercase tracking-widest mt-1">友誼大考驗</p>
                                </div>
                            </div>
                            {activeTab === 'itinerary' && <div className="bg-teal-50 px-3 py-1.5 rounded-full text-[10px] font-black text-teal-700 uppercase shadow-inner">Day {activeDay}</div>}
                        </div>
                        {activeTab === 'itinerary' && (
                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1">
                                {dates.map((d, i) => (
                                    <button key={i} onClick={() => setActiveDay(i + 1)} className={`flex-none w-14 py-3 rounded-[22px] flex flex-col items-center justify-center transition-all ${activeDay === i + 1 ? 'bg-teal-700 text-white shadow-md' : 'bg-white text-stone-300 border border-stone-50'}`}>
                                        <span className="text-[10px] font-bold uppercase mb-0.5">{d.d}</span>
                                        <span className="text-lg font-black leading-none">{d.n}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    <main className="px-5 pt-4 max-w-xl mx-auto space-y-6 relative z-10 text-left text-sm font-medium">
                        {activeTab === 'itinerary' && (
                            <div className="space-y-6 pb-20">
                                <div className="bg-white rounded-[30px] p-5 flex items-center justify-between border border-stone-200 shadow-sm card-shadow">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-amber-50 p-2.5 rounded-2xl text-amber-500 shadow-inner"><Icon name="sun" size={28} /></div>
                                        <div><p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest leading-none">Seoul Weather</p><p className="text-base font-black text-slate-700">18°C 晴天 / 體感 16°C</p></div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {(itineraries[activeDay] || []).map((item, idx) => {
                                        const s = CATEGORY_STYLES[item.type] || CATEGORY_STYLES['其他'];
                                        return (
                                            <div key={item.id || idx}>
                                                <div className="flex items-center gap-4 px-6 h-10">
                                                    <div className="w-[2px] h-full bg-stone-200 relative flex items-center justify-center"><Icon name="car" size={12} className="text-stone-300" /></div>
                                                    <span className="text-[9px] font-black text-teal-600 uppercase">Uber / Taxi 預估 {10+idx*10} mins</span>
                                                </div>
                                                <div className={`bg-white rounded-[30px] border ${s.border} shadow-sm p-5 space-y-4`}>
                                                    <div className="flex gap-4">
                                                        <div className={`w-12 h-12 rounded-2xl flex-shrink-0 flex items-center justify-center ${s.bg} ${s.text} border ${s.border} shadow-inner`}><Icon name={s.icon} size={20} /></div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex justify-between items-start">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-[10px] font-bold text-stone-400">{item.time}</span>
                                                                    <span className={`${s.badge} text-[8px] px-2 py-0.5 rounded-full font-black uppercase`}>{item.type}</span>
                                                                    {item.status === 'booked' && <span className="bg-rose-500 text-white text-[8px] px-2 py-0.5 rounded-full font-black shadow-sm">已訂位</span>}
                                                                    {item.canBook && <span className="bg-emerald-500 text-white text-[8px] px-2 py-0.5 rounded-full font-black shadow-sm">可預約</span>}
                                                                </div>
                                                            </div>
                                                            <h4 className="font-black text-slate-800 text-base leading-tight mt-1">{item.name}</h4>
                                                            <p className="text-xs text-stone-400 mt-1 italic">✿ {item.note || 'Enjoy Seoul'}</p>
                                                        </div>
                                                    </div>
                                                    {item.address && (
                                                        <div className="flex gap-2">
                                                            <button onClick={() => window.open(`https://map.naver.com/v5/search/${encodeURIComponent(item.address)}`)} className="flex-1 py-3 bg-teal-700 text-white font-bold text-xs rounded-2xl shadow-sm active:bg-teal-800">Naver Map</button>
                                                            <button onClick={() => copyAddr(item.address)} className="px-5 py-3 bg-stone-50 text-stone-600 font-bold text-xs rounded-2xl border border-stone-100">複製</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'spending' && (
                            <div className="space-y-6 pb-20">
                                <div className="bg-slate-800 rounded-[40px] p-8 text-white shadow-xl relative overflow-hidden text-center border-b-8 border-teal-600">
                                    <div className="relative z-10 text-left">
                                        <p className="text-stone-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Trip Spending</p>
                                        <h2 className="text-4xl font-black italic tracking-tight mb-6 leading-none">{totalKRW.toLocaleString()} <span className="text-sm font-normal opacity-40 uppercase">KRW</span></h2>
                                        <div className="grid grid-cols-3 gap-2 border-t border-white/10 pt-4">
                                            {travelers.map(t => (
                                                <div key={t} className="text-center">
                                                    <p className="text-[9px] text-stone-400 font-bold uppercase mb-1">{t}</p>
                                                    <p className={`text-xs font-black ${balances[t].final >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        {balances[t].final >= 0 ? '+' : ''}{balances[t].final.toFixed(0).toLocaleString()}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <Icon name="coins" size={130} className="absolute -right-10 -bottom-10 opacity-5 rotate-[-15deg]" />
                                </div>
                                <div className="space-y-3">
                                    {spendingList.map(s => (
                                        <div key={s.id} className="bg-white rounded-[25px] p-4 border border-stone-200 shadow-sm flex items-center gap-4 relative group">
                                            <div className={`w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-xs bg-stone-50 text-teal-600 shadow-inner`}>＄</div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-center mb-0.5"><span className="text-[9px] font-bold text-stone-400 uppercase">{s.date}</span><div className="flex gap-1"><span className={`text-[8px] font-bold px-2 py-0.5 rounded-full ${s.method === '信用卡' ? 'bg-indigo-100 text-indigo-700' : 'bg-amber-100 text-amber-700'}`}>{s.method}</span><span className="text-[8px] font-bold px-2 py-0.5 bg-stone-100 text-stone-500 rounded-full">{s.paidBy}</span></div></div>
                                                <h4 className="font-bold text-slate-800 leading-tight truncate">{s.name}</h4>
                                            </div>
                                            <div className="text-right"><p className="font-black text-teal-700 leading-none">{parseFloat(s.amount).toLocaleString()}</p></div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowModal('spending')} className="fixed bottom-24 right-6 w-16 h-16 bg-teal-700 text-white rounded-full shadow-xl flex items-center justify-center border-4 border-white z-50 active:scale-90 shadow-teal-100"><Icon name="plus" size={32} /></button>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-6 pb-20">
                                <section className="bg-white rounded-[35px] p-6 shadow-sm border border-stone-200 space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-sm font-bold flex items-center gap-2 text-teal-700"><Icon name="calculator" /> 雙向換算</h3>
                                        <div className="flex items-center gap-2 bg-stone-50 px-3 py-1.5 rounded-full border border-stone-100 shadow-inner">
                                            <span className="text-[10px] font-bold text-stone-400">1 TWD = </span>
                                            <input type="number" value={rate} onChange={e => setRate(parseFloat(e.target.value) || 1)} className="w-10 bg-transparent text-center font-black text-teal-600 outline-none" />
                                            <span className="text-[10px] font-bold text-stone-400">KRW</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-[1fr,auto,1fr] items-center gap-3">
                                        <div className="text-center space-y-1"><p className="text-[9px] font-black text-stone-300 uppercase">KRW 韓幣</p><input type="number" value={krw} onChange={e => { setKrw(e.target.value); setTwd(e.target.value ? (e.target.value/rate).toFixed(0) : ''); }} className="bg-stone-50 p-5 rounded-[25px] outline-none font-black text-xl text-teal-700 border border-transparent focus:border-teal-500 w-full text-center shadow-inner" /></div>
                                        <div className="text-stone-300 mt-4"><Icon name="arrow-left-right" size={18} /></div>
                                        <div className="text-center space-y-1"><p className="text-[9px] font-black text-stone-300 uppercase">TWD 台幣</p><input type="number" value={twd} onChange={e => { setTwd(e.target.value); setKrw(e.target.value ? (e.target.value*rate).toFixed(0) : ''); }} className="bg-stone-50 p-5 rounded-[25px] outline-none font-black text-xl text-slate-800 border border-transparent focus:border-stone-400 w-full text-center shadow-inner" /></div>
                                    </div>
                                </section>
                                
                                <section className="space-y-4">
                                    <div className="flex items-center justify-between px-2">
                                        <h3 className="text-sm font-bold flex items-center gap-2 text-teal-700 uppercase tracking-widest"><Icon name="ticket" size={18} /> 機票資訊</h3>
                                        <div className="bg-teal-50 px-3 py-1 rounded-full text-teal-600 text-[10px] font-bold flex items-center gap-1 shadow-sm"><Icon name="timer" size={12}/>總飛行: 4h 40m</div>
                                    </div>
                                    <div className="bg-white rounded-[30px] shadow-sm border border-stone-100 border-l-[10px] border-l-teal-600 p-6 space-y-5">
                                        <div className="flex justify-between items-center border-b border-stone-50 pb-4">
                                            <div><span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">04/16 (THU)</span><p className="font-black text-teal-600 mt-1">RMQ 17:55 → ICN 21:35</p></div>
                                            <div className="bg-teal-50 px-2 py-0.5 rounded text-[10px] font-bold text-teal-600">2h 40m</div>
                                        </div>
                                        <div className="flex justify-between items-center opacity-80 pt-2">
                                            <div><span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">04/21 (TUE)</span><p className="font-black text-emerald-600 mt-1">ICN 14:45 → RMQ 16:45</p></div>
                                            <div className="bg-emerald-50 px-2 py-0.5 rounded text-[10px] font-bold text-emerald-600">2h 00m</div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-stone-200 px-6 py-4 flex justify-between items-center z-[90] rounded-t-[40px] shadow-2xl shadow-stone-200">
                        <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'itinerary' ? 'tab-active' : 'text-stone-300'}`}><Icon name="calendar" size={20} /><span className="text-[9px] font-black uppercase">行程</span></button>
                        <button onClick={() => setActiveTab('shopping')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'shopping' ? 'text-purple-600 scale-110' : 'text-stone-300'}`}><Icon name="shopping-basket" size={20} /><span className="text-[9px] font-black uppercase">購物</span></button>
                        <button onClick={() => setActiveTab('spending')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'spending' ? 'text-teal-600 scale-110' : 'text-stone-300'}`}><Icon name="coins" size={20} /><span className="text-[9px] font-black uppercase">花費</span></button>
                        <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'info' ? 'text-teal-700' : 'text-stone-300'}`}><Icon name="info" size={20} /><span className="text-[9px] font-black uppercase">資訊</span></button>
                    </nav>

                    {/* --- Spending Modal --- */}
                    {showModal === 'spending' && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowModal(null)}></div>
                            <div className="bg-white w-full max-w-md rounded-t-[40px] p-8 relative shadow-2xl border-t-8 border-teal-700 text-left">
                                <h2 className="text-xl font-bold text-slate-800 mb-6 uppercase tracking-tight">新增精準支出 ＄</h2>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-stone-400 uppercase tracking-widest">日期</label><input type="date" className="w-full bg-stone-50 rounded-xl p-3 text-sm font-bold border-none" value={spendForm.date} onChange={e => setSpendForm({...spendForm, date: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-stone-400 uppercase tracking-widest">金額 (KRW)</label><input type="number" className="w-full bg-stone-50 rounded-xl p-3 text-sm font-bold border-none outline-none" value={spendForm.amount} onChange={e => setSpendForm({...spendForm, amount: e.target.value})} /></div>
                                    </div>
                                    <div className="flex gap-2">
                                        {['現金', '信用卡'].map(m => <button key={m} onClick={() => setSpendForm({...spendForm, method: m})} className={`flex-1 py-3 rounded-xl font-bold text-xs ${spendForm.method === m ? 'bg-indigo-600 text-white shadow-md' : 'bg-stone-50 text-stone-400 border'}`}>{m}</button>)}
                                    </div>
                                    <div className="bg-stone-50 p-4 rounded-3xl border border-stone-100 space-y-3">
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">誰墊的錢？</label><div className="flex gap-2 mt-1">{travelers.map(t => <button key={t} onClick={() => setSpendForm({...spendForm, paidBy: t})} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${spendForm.paidBy === t ? 'bg-teal-600 text-white shadow-sm' : 'bg-white text-stone-400 border border-stone-100'}`}>{t}</button>)}</div></div>
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">參與名單？</label><div className="flex gap-2 mt-1">{travelers.map(t => <button key={t} onClick={() => { const cur = spendForm.splitBetween; setSpendForm({...spendForm, splitBetween: cur.includes(t) ? cur.filter(p => p !== t) : [...cur, t]})}} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${spendForm.splitBetween.includes(t) ? 'bg-emerald-100 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white text-stone-300 border border-stone-100'}`}>{t}</button>)}</div></div>
                                    </div>
                                    <input type="text" placeholder="品項名稱 (如：烤牛腸)" className="w-full bg-stone-50 rounded-xl p-3 text-sm font-bold border-none outline-none" value={spendForm.name} onChange={e => setSpendForm({...spendForm, name: e.target.value})} />
                                    <button onClick={() => { if(!spendForm.amount || !spendForm.name) return; addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'spending'), spendForm); setShowModal(null); }} className="w-full bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg mt-4 active:scale-95 transition-transform shadow-teal-100">同步至雲端 ＄</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
