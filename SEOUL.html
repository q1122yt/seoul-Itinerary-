<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾喝掛之旅 - 友誼大考驗</title>
    <!-- 基礎框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafaf9; overflow-x: hidden; color: #334155; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.4; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        .sakura { position: fixed; top: -10px; pointer-events: none; z-index: 0; animation: fall linear infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #0f766e; transform: scale(1.1); font-weight: 900; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 修正：使用 text/babel 並配合 data-type="module" 以支援 Firebase 導入 -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const { useState, useEffect, useMemo } = React;

        // Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'seoul-drinking-trip-v1';

        const CATEGORY_STYLES = {
            '美食': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200', icon: 'utensils', badge: 'bg-orange-100 text-orange-800' },
            '購物': { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200', icon: 'shopping-bag', badge: 'bg-purple-100 text-purple-800' },
            '景點': { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200', icon: 'camera', badge: 'bg-blue-100 text-blue-800' },
            '住宿': { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', icon: 'home', badge: 'bg-emerald-100 text-emerald-800' },
            '航班': { bg: 'bg-slate-800', text: 'text-white', border: 'border-slate-900', icon: 'plane', badge: 'bg-slate-700 text-white' },
            '其他': { bg: 'bg-gray-50', text: 'text-gray-700', border: 'border-gray-200', icon: 'more-vertical', badge: 'bg-gray-100 text-gray-800' }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(1);
            const [itineraries, setItineraries] = useState({});
            const [spendingList, setSpendingList] = useState([]);
            const [shoppingList, setShoppingList] = useState([]);
            const [rate, setRate] = useState(42);
            const [krw, setKrw] = useState('');
            const [twd, setTwd] = useState('');
            const [travelers] = useState(['任', '晉', '沛']);

            const [showModal, setShowModal] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [itinForm, setItinForm] = useState({ type: '美食', name: '', time: '12:00', address: '', note: '' });
            const [spendForm, setSpendForm] = useState({ name: '', amount: '', method: '現金', paidBy: '任', splitBetween: ['任', '晉', '沛'], date: new Date().toISOString().split('T')[0] });
            const [showCopyToast, setShowCopyToast] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubItin = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'itineraries'), (snap) => {
                    const data = {};
                    snap.forEach(doc => {
                        const item = { ...doc.data(), id: doc.id };
                        if (!data[item.day]) data[item.day] = [];
                        data[item.day].push(item);
                    });
                    Object.keys(data).forEach(d => data[d].sort((a,b) => a.time.localeCompare(b.time)));
                    setItineraries(data);
                });
                const unsubSpend = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'spending'), (snap) => {
                    setSpendingList(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })).sort((a,b) => b.date.localeCompare(a.date)));
                });
                const unsubShop = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'shopping'), (snap) => {
                    setShoppingList(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });
                return () => { unsubItin(); unsubSpend(); unsubShop(); };
            }, [user]);

            const handleSaveItin = async () => {
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                if (editingItem) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', editingItem.id), { ...itinForm, day: activeDay });
                else await addDoc(ref, { ...itinForm, day: activeDay });
                setShowModal(null); setEditingItem(null);
            };

            const delItem = async (col, id) => {
                if(!confirm('確定要移除這個項目嗎？這將會同步從所有人的手機中消失。')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                setShowModal(null); setEditingItem(null);
            };

            const copyToClipboard = (txt) => {
                navigator.clipboard.writeText(txt);
                setShowCopyToast(true);
                setTimeout(() => setShowCopyToast(false), 2000);
            };

            const summary = useMemo(() => {
                const res = {};
                travelers.forEach(t => res[t] = { paid: 0, cost: 0 });
                spendingList.forEach(s => {
                    const amt = parseFloat(s.amount) || 0;
                    if (res[s.paidBy]) res[s.paidBy].paid += amt;
                    const share = amt / (s.splitBetween?.length || 1);
                    (s.splitBetween || []).forEach(p => { if (res[p]) res[p].cost += share; });
                });
                return res;
            }, [spendingList, travelers]);

            const totalKRW = spendingList.reduce((a, b) => a + (parseFloat(b.amount) || 0), 0);

            const dates = [{d:'Thu',n:'16'},{d:'Fri',n:'17'},{d:'Sat',n:'18'},{d:'Sun',n:'19'},{d:'Mon',n:'20'},{d:'Tue',n:'21'}];

            if (!user) return <div className="h-screen flex items-center justify-center text-teal-600 font-black bg-white">正在連線至首爾雲端...</div>;

            return (
                <div className="min-h-screen relative pb-32">
                    {[...Array(6)].map((_, i) => (
                        <div key={i} className="sakura" style={{ left: `${Math.random() * 100}%`, animationDuration: `${Math.random() * 10 + 10}s`, animationDelay: `${i*2}s` }}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="#14b8a6" fillOpacity="0.1"><path d="M12 21.5C12 21.5 19 16 21 11C23 6 18 2 13 5C12 5.5 12 6 12 6C12 6 12 5.5 11 5C6 2 1 6 3 11C5 16 12 21.5 12 21.5Z" /></svg>
                        </div>
                    ))}

                    {showCopyToast && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900/90 text-white px-6 py-2 rounded-full text-xs font-bold shadow-2xl backdrop-blur-md">地址已複製！</div>}

                    <header className="bg-white px-6 pt-12 pb-4 sticky top-0 z-40 rounded-b-[40px] shadow-sm border-b border-stone-100">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-teal-700 p-2.5 rounded-2xl text-white shadow-lg"><Icon name="beer" size={24} /></div>
                                <div className="text-left leading-tight">
                                    <h1 className="text-xl font-black text-slate-800 tracking-tight">首爾喝掛之旅</h1>
                                    <p className="text-stone-400 text-[10px] font-bold uppercase tracking-widest mt-1">友誼大考驗</p>
                                </div>
                            </div>
                            {activeTab === 'itinerary' && <div className="bg-teal-50 px-3 py-1.5 rounded-full text-[10px] font-black text-teal-700 uppercase shadow-inner">Day {activeDay}</div>}
                        </div>
                        {activeTab === 'itinerary' && (
                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1">
                                {dates.map((d, i) => (
                                    <button key={i} onClick={() => setActiveDay(i + 1)} className={`flex-none w-14 py-3 rounded-[22px] flex flex-col items-center justify-center transition-all ${activeDay === i + 1 ? 'bg-teal-700 text-white shadow-md' : 'bg-white text-stone-300 border border-stone-50'}`}>
                                        <span className="text-[10px] font-bold uppercase mb-0.5">{d.d}</span>
                                        <span className="text-lg font-black leading-none">{d.n}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    <main className="px-5 pt-4 max-w-xl mx-auto space-y-6 relative z-10 text-left">
                        {activeTab === 'itinerary' && (
                            <div className="space-y-6 pb-20">
                                <div className="bg-white rounded-[30px] p-5 flex items-center justify-between border border-stone-200 shadow-sm">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-amber-50 p-2.5 rounded-2xl text-amber-500 shadow-inner"><Icon name="sun" size={28} /></div>
                                        <div><p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest leading-none">Seoul Weather</p><p className="text-base font-black text-slate-700">18°C 晴天 / 體感 16°C</p></div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {(itineraries[activeDay] || []).map((item, idx) => {
                                        const s = CATEGORY_STYLES[item.type] || CATEGORY_STYLES['其他'];
                                        return (
                                            <div key={item.id}>
                                                <div className="flex items-center gap-4 px-6 h-12">
                                                    <div className="w-[2px] h-full bg-stone-200 relative flex items-center justify-center"><div className="bg-white p-1 rounded-full border border-stone-100 shadow-sm"><Icon name="car" size={14} className="text-stone-400" /></div></div>
                                                    <span className="text-[9px] font-black text-teal-600 uppercase">Uber / Taxi 預估 {10+idx*10} mins</span>
                                                </div>
                                                <div className={`bg-white rounded-[35px] border ${s.border} shadow-sm p-5 space-y-4`}>
                                                    <div className="flex gap-4">
                                                        <div className={`w-14 h-14 rounded-2xl flex-shrink-0 flex items-center justify-center ${s.bg} ${s.text} border ${s.border} shadow-inner`}><Icon name={s.icon} size={22} /></div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex justify-between items-start">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-[10px] font-bold text-stone-400">{item.time}</span>
                                                                    <span className={`${s.badge} text-[9px] px-2 py-0.5 rounded-full font-black uppercase tracking-tight`}>{item.type}</span>
                                                                    {item.status === 'booked' && <span className="bg-rose-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black shadow-sm">已訂位</span>}
                                                                    {item.canBook && <span className="bg-emerald-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black shadow-sm">可取號/訂位</span>}
                                                                </div>
                                                                <button onClick={() => { setEditingItem(item); setItinForm(item); setShowModal('itinerary'); }} className="text-stone-300 active:scale-95"><Icon name="more-vertical" size={18}/></button>
                                                            </div>
                                                            <h4 className="font-black text-slate-800 text-lg leading-tight mt-1">{item.name}</h4>
                                                            <p className="text-xs text-stone-400 mt-1 italic leading-relaxed">✿ {item.note || 'Enjoy Seoul'}</p>
                                                        </div>
                                                    </div>
                                                    {item.address && (
                                                        <div className="flex gap-2">
                                                            <button onClick={() => window.open(`https://map.naver.com/v5/search/${encodeURIComponent(item.address)}`)} className="flex-1 py-3 bg-teal-700 text-white font-bold text-xs rounded-2xl shadow-sm active:bg-teal-800 transition-colors">Naver Map</button>
                                                            <button onClick={() => copyToClipboard(item.address)} className="px-5 py-3 bg-stone-50 text-stone-600 font-bold text-xs rounded-2xl border border-stone-100 active:bg-stone-100">複製地址</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => { setEditingItem(null); setItinForm({ type: '美食', name: '', time: '12:00', address: '', note: '' }); setShowModal('itinerary'); }} className="fixed bottom-24 right-6 w-16 h-16 bg-teal-700 text-white rounded-full shadow-2xl flex items-center justify-center border-4 border-white transition-transform active:scale-90 z-50"><Icon name="plus" size={32} /></button>
                            </div>
                        )}

                        {activeTab === 'shopping' && (
                            <div className="space-y-6 pt-4 text-center pb-20">
                                <div className="bg-purple-50 p-6 rounded-[35px] border border-purple-100 text-purple-700 text-sm font-medium leading-relaxed shadow-sm">🛒 旅伴同步清單 ♡<br/><span className="text-[10px] opacity-60">拍下商品照或截圖，血拚更有效率！</span></div>
                                <div className="grid grid-cols-2 gap-4">
                                    {shoppingList.map(item => (
                                        <div key={item.id} className="bg-white rounded-[30px] border border-purple-100 p-4 relative group shadow-sm">
                                            <div className="aspect-square bg-purple-50 rounded-2xl flex items-center justify-center border border-purple-100 shadow-inner"><Icon name="image" size={32} className="text-purple-200 opacity-40" /></div>
                                            <h4 className="font-bold text-purple-900 px-2 truncate text-sm mt-3">{item.name}</h4>
                                            <button onClick={() => handleDelete('shopping', item.id)} className="absolute top-2 right-2 p-1.5 bg-white/90 rounded-full text-rose-400 shadow-sm opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { const n = prompt('大家這次想買什麼？'); if(n) addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shopping'), { name: n }); }} className="fixed bottom-24 right-6 w-16 h-16 bg-purple-600 text-white rounded-full shadow-xl flex items-center justify-center border-4 border-white z-50 active:scale-90 shadow-purple-100"><Icon name="plus" size={32} /></button>
                            </div>
                        )}

                        {activeTab === 'spending' && (
                            <div className="space-y-6">
                                <div className="bg-slate-800 rounded-[40px] p-8 text-white shadow-xl relative overflow-hidden text-center border-b-8 border-teal-600">
                                    <div className="relative z-10 text-left">
                                        <p className="text-stone-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Trip Spending</p>
                                        <h2 className="text-4xl font-black italic tracking-tight leading-none mb-4">{totalKRW.toLocaleString()} <span className="text-sm font-normal opacity-40 uppercase">KRW</span></h2>
                                        <div className="grid grid-cols-2 border-t border-white/10 pt-4 gap-4">
                                            <div><p className="text-[9px] text-stone-400 font-bold uppercase tracking-tighter">旅伴應付 (均分)</p><p className="text-lg font-black text-teal-400">{(totalKRW / 3).toFixed(0).toLocaleString()}</p></div>
                                            <div className="text-right">
                                                <p className="text-[9px] text-stone-400 font-bold uppercase tracking-tighter">任 的結餘</p>
                                                <p className={`text-lg font-black ${summary['任']?.paid - summary['任']?.cost >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                    {((summary['任']?.paid - summary['任']?.cost || 0)).toFixed(0).toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                    <Icon name="coins" size={130} className="absolute -right-10 -bottom-10 opacity-5 rotate-[-15deg]" />
                                </div>
                                <div className="space-y-3 pb-20">
                                    {spendingList.map(s => (
                                        <div key={s.id} className="bg-white rounded-[30px] p-5 border border-stone-200 shadow-sm flex items-center gap-4 relative group">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xs ${s.method === '信用卡' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'} shadow-inner`}>＄</div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-center mb-0.5"><span className="text-[9px] font-bold text-stone-400 uppercase tracking-tighter">{s.date}</span><div className="flex gap-1"><span className={`text-[8px] font-bold px-2 py-0.5 rounded-full ${s.method === '信用卡' ? 'bg-indigo-100 text-indigo-700' : 'bg-amber-100 text-amber-700'}`}>{s.method}</span><span className="text-[8px] font-bold px-2 py-0.5 bg-stone-100 text-stone-500 rounded-full">{s.paidBy}</span></div></div>
                                                <h4 className="font-bold text-slate-800 leading-tight truncate">{s.name}</h4>
                                            </div>
                                            <div className="text-right"><p className="font-black text-teal-700 leading-none">{parseFloat(s.amount).toLocaleString()}</p></div>
                                            <button onClick={() => handleDelete('spending', s.id)} className="absolute -right-2 -top-2 opacity-0 group-hover:opacity-100 bg-rose-500 text-white rounded-full p-1 shadow-md"><Icon name="x" size={12}/></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowModal('spending')} className="fixed bottom-24 right-6 w-16 h-16 bg-teal-700 text-white rounded-full shadow-xl flex items-center justify-center border-4 border-white z-50 active:scale-90"><Icon name="plus" size={32} /></button>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-6 pb-20">
                                <section className="bg-white rounded-[35px] p-6 shadow-sm border border-stone-200 space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-sm font-bold flex items-center gap-2 text-teal-700"><Icon name="calculator" /> 雙向匯率計算機</h3>
                                        <div className="flex items-center gap-2 bg-stone-50 px-3 py-1.5 rounded-full border border-stone-100 shadow-inner">
                                            <span className="text-[10px] font-bold text-stone-400 uppercase">1 TWD = </span>
                                            <input type="number" step="0.1" value={rate} onChange={e => setRate(parseFloat(e.target.value) || 1)} className="w-12 bg-transparent text-center font-black text-teal-600 outline-none" />
                                            <span className="text-[10px] font-bold text-stone-400 uppercase">KRW</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-[1fr,auto,1fr] items-center gap-3">
                                        <div className="text-center space-y-1"><p className="text-[10px] font-black text-stone-400 uppercase">KRW 韓幣</p><input type="number" value={krw} onChange={e => { setKrw(e.target.value); setTwd(e.target.value ? (e.target.value/rate).toFixed(0) : ''); }} className="bg-stone-50 p-4 rounded-[20px] outline-none font-black text-xl text-teal-700 border border-transparent focus:border-teal-500 w-full text-center shadow-inner" /></div>
                                        <div className="text-stone-300 mt-4"><Icon name="arrow-left-right" size={18} /></div>
                                        <div className="text-center space-y-1"><p className="text-[10px] font-black text-stone-400 uppercase">TWD 台幣</p><input type="number" value={twd} onChange={e => { setTwd(e.target.value); setKrw(e.target.value ? (e.target.value*rate).toFixed(0) : ''); }} className="bg-stone-50 p-4 rounded-[20px] outline-none font-black text-xl text-slate-800 border border-transparent focus:border-stone-400 w-full text-center shadow-inner" /></div>
                                    </div>
                                </section>
                                
                                <section className="space-y-4">
                                    <div className="flex items-center justify-between px-2">
                                        <h3 className="text-sm font-bold flex items-center gap-2 text-teal-700 uppercase tracking-widest"><Icon name="ticket" size={18} /> 機票資訊 (RMQ ↔ ICN)</h3>
                                        <div className="bg-teal-50 px-3 py-1 rounded-full text-teal-600 text-[10px] font-bold flex items-center gap-1 shadow-sm"><Icon name="timer" size={12}/>總飛行: 4h 40m</div>
                                    </div>
                                    <div className="bg-white rounded-[30px] shadow-sm border border-stone-100 border-l-[12px] border-l-teal-600 p-6 space-y-6 overflow-hidden relative">
                                        <div className="flex justify-between items-center border-b border-stone-50 pb-4">
                                            <div><span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">Flight 04/16</span><p className="font-black text-teal-600">RMQ 17:55 → ICN 21:35</p></div>
                                            <div className="bg-teal-50 px-2 py-0.5 rounded text-[10px] font-bold text-teal-600">2h 40m</div>
                                        </div>
                                        <div className="flex justify-between items-center opacity-80">
                                            <div><span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">Flight 04/21</span><p className="font-black text-emerald-600">ICN 14:45 → RMQ 16:45</p></div>
                                            <div className="bg-emerald-50 px-2 py-0.5 rounded text-[10px] font-bold text-emerald-600">2h 00m</div>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-white rounded-[35px] p-6 shadow-sm border border-stone-200">
                                     <h3 className="text-sm font-bold flex items-center gap-2 text-teal-700 mb-4"><Icon name="users" size={18}/> 旅伴管理</h3>
                                     <div className="flex flex-wrap gap-2">
                                        {travelers.map(t => (
                                            <span key={t} className="bg-stone-50 text-stone-600 px-5 py-2 rounded-full text-xs font-bold border border-stone-100 shadow-inner">{t}</span>
                                        ))}
                                     </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-stone-200 px-6 py-4 flex justify-between items-center z-[90] rounded-t-[45px] shadow-2xl">
                        <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'itinerary' ? 'tab-active' : 'text-stone-300'}`}><Icon name="calendar" size={22} fill={activeTab === 'itinerary' ? 'currentColor' : 'none'} /><span className="text-[9px] font-black uppercase tracking-tighter">行程</span></button>
                        <button onClick={() => setActiveTab('shopping')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'shopping' ? 'text-purple-600 scale-110' : 'text-stone-300'}`}><Icon name="shopping-basket" size={22} /><span className="text-[9px] font-black uppercase tracking-tighter">購物</span></button>
                        <button onClick={() => setActiveTab('spending')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'spending' ? 'text-teal-600' : 'text-stone-300'}`}><Icon name="coins" size={22} /><span className="text-[9px] font-black uppercase tracking-tighter">花費</span></button>
                        <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'info' ? 'text-teal-700' : 'text-stone-300'}`}><Icon name="info" size={22} /><span className="text-[9px] font-black uppercase tracking-tighter">資訊</span></button>
                    </nav>

                    {/* Modals */}
                    {showModal === 'itinerary' && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowModal(null)}></div>
                            <div className="bg-white w-full max-w-md rounded-t-[40px] p-8 relative shadow-2xl border-t-8 border-teal-700 text-left">
                                <h2 className="text-xl font-bold text-slate-800 mb-6">{editingItem ? '編輯行程' : '新增行程'}</h2>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-stone-400">類別</label><select className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none" value={itinForm.type} onChange={e => setItinForm({...itinForm, type: e.target.value})}>{Object.keys(CATEGORY_STYLES).map(k => <option key={k} value={k}>{k}</option>)}</select></div>
                                        <div><label className="text-xs font-bold text-stone-400">時間</label><input type="time" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none" value={itinForm.time} onChange={e => setItinForm({...itinForm, time: e.target.value})} /></div>
                                    </div>
                                    <input type="text" placeholder="地點名稱" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none outline-none" value={itinForm.name} onChange={e => setItinForm({...itinForm, name: e.target.value})} />
                                    <input type="text" placeholder="地址" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none outline-none" value={itinForm.address} onChange={e => setItinForm({...itinForm, address: e.target.value})} />
                                    <div className="flex gap-2">
                                        {editingItem && <button onClick={() => delItem('itineraries', editingItem.id)} className="w-14 h-14 bg-rose-50 text-rose-400 rounded-2xl flex items-center justify-center border border-rose-100"><Icon name="trash-2" size={24}/></button>}
                                        <button onClick={handleSaveItin} className="flex-1 bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg">確認儲存</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal === 'spending' && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowModal(null)}></div>
                            <div className="bg-white w-full max-w-md rounded-t-[40px] p-8 relative shadow-2xl border-t-8 border-teal-700 text-left">
                                <h2 className="text-xl font-bold text-slate-800 mb-6">新增開支 ＄</h2>
                                <div className="space-y-4 pb-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-stone-400">日期</label><input type="date" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none" value={spendForm.date} onChange={e => setSpendForm({...spendForm, date: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-stone-400">金額 (KRW)</label><input type="number" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none" value={spendForm.amount} onChange={e => setSpendForm({...spendForm, amount: e.target.value})} /></div>
                                    </div>
                                    <div className="flex gap-2">
                                        {['現金', '信用卡'].map(m => <button key={m} onClick={() => setSpendForm({...spendForm, method: m})} className={`flex-1 py-3 rounded-xl font-bold text-xs ${spendForm.method === m ? 'bg-indigo-600 text-white shadow-md' : 'bg-stone-50 text-stone-400 border'}`}>{m}</button>)}
                                    </div>
                                    <div className="bg-stone-50 p-4 rounded-2xl border border-stone-100 space-y-3">
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">付款者</label><div className="flex gap-2 mt-1">{travelers.map(t => <button key={t} onClick={() => setSpendForm({...spendForm, paidBy: t})} className={`px-4 py-1.5 rounded-full text-xs font-bold ${spendForm.paidBy === t ? 'bg-teal-600 text-white' : 'bg-white text-stone-400 border'}`}>{t}</button>)}</div></div>
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">分攤者</label><div className="flex gap-2 mt-1">{travelers.map(t => <button key={t} onClick={() => { const cur = spendForm.splitBetween; setSpendForm({...spendForm, splitBetween: cur.includes(t) ? cur.filter(p => p !== t) : [...cur, t]})}} className={`px-4 py-1.5 rounded-full text-xs font-bold ${spendForm.splitBetween.includes(t) ? 'bg-emerald-100 text-emerald-700' : 'bg-white text-stone-300 border'}`}>{t}</button>)}</div></div>
                                    </div>
                                    <input type="text" placeholder="品項 (如：炸雞)" className="w-full bg-stone-100 rounded-xl p-3 text-sm font-bold border-none" value={spendForm.name} onChange={e => setSpendForm({...spendForm, name: e.target.value})} />
                                    <button onClick={async () => { if(!spendForm.amount || !spendForm.name) return; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'spending'), spendForm); setShowModal(null); }} className="w-full bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg mt-4">同步開支</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
